# OPTIONAL — phone app + API proxy. Paste under services: in docker-compose.yml.
# Requires migraine-tracker service (see docker-compose.service.yml).

  migraine-app:
    image: nginx:alpine
    container_name: migraine-app
    restart: unless-stopped
    ports:
      - "8765:80"
    volumes:
      - ./migraine-pressure-tracker/migraine-tracker/app:/usr/share/nginx/html:ro
      - ./migraine-pressure-tracker/migraine-tracker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - migraine-tracker
